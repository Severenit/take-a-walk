<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2F353B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{% block title %}{{ site.title }}{% endblock %}</title>
<meta name="description" content="{% block desc %}{{ site.tagline }}{% endblock %}">
<link rel="manifest" href="{{ site.base }}/manifest.json">
<link rel="icon" href="{{ site.base }}/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="{{ site.base }}/icon.svg">
<link rel="stylesheet" href="{{ site.base }}/app.css">
</head>
<body>
<div class="wrap">
{% block body %}{% endblock %}
</div>
<script src="{{ site.base }}/app.js" defer></script>
</body>
</html>
