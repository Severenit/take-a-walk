title: Прогулки
short: Прогулки
tagline: Города, которых не видно с первого раза
about: >
  Пешие маршруты по вещам, которые прячутся на виду: фигурки в трещинах штукатурки,
  предметы под стеклом мостовой, двери, на которых кто-то что-то нарисовал.
  Каждая точка — с фотографией, историей, которую можно рассказать вслух, и кнопкой в навигатор.
repo: https://github.com/severenit/take-a-walk

