title: Квесты
intro: >
  Зеленоградск — город, где котов больше, чем точек в любом маршруте.
  Поэтому квесты здесь бесконечные.

quests:
  - title: Коты Кранца
    id: koty-krantsa
    text: >
      Коты здесь — городская инфраструктура: у них есть жильё, транспортные
      знаки и мебель. Собираем всё кошачье, что прибито, нарисовано
      или построено. Живые коты вне зачёта — их слишком много.
    how: >
      Идти по Курортному и во дворы, снимать каждый рукотворный кошачий объект
      с адресом. Живого кота на объекте считать бонусом.
    items:
      - name: Расписные электрошкафы
        have: yes
        photo: grustny.jpg
        note: >
          найдено шесть: стимпанк в цилиндре, почтальон, кот с мышками,
          грустный котёнок, лохматый чёрный, рыжий в шарфе. Похоже, это
          только начало серии
      - name: Котолюки
        have: yes
        photo: lyuk-mozaika.jpg
        note: два — мозаичный у Cinnabon и чугунный «Зеленоградск 2024»
      - name: Муралы с котами
        have: yes
        photo: stremyanka.jpg
        note: >
          пять больших: коты на стремянке и кот-гигант на подстанции
          (оба подписаны @Kirill Heinz), спящий кот у «ФилоСовии»,
          сиамский на Пограничной, дерево котов
      - name: Кот, сползающий по стене
        addr: угол Курортного и Пограничной
        have: yes
        note: кованый, под окном — тянет лапы вниз
      - name: Вывеска «Оптика» с котом на очках
        addr: угол Курортного и Пограничной
        have: yes
        photo: optika.jpg
      - name: Котёнок под зонтом
        addr: электрошкаф у сквера Котофейни
        have: yes
        photo: kotenok-zont.jpg
        note: сидит под нарисованным дождём
      - name: Спящий кот и указатель «ФилоСовии»
        addr: Курортный пр., у музея
        have: yes
        photo: spyashchy.jpg
        note: рыже-белый, во всю стену; рядом совёнок с деревянной табличкой
      - name: Шкаф-кот целиком
        addr: Курортный пр., западнее вращающегося кота
        have: yes
        photo: lohmaty.jpg
        note: весь шкаф расписан под лохматого чёрного кота с круглыми глазами
      - name: Мини-скамейки для котов
        addr: Курортный проспект
        note: обычные скамейки, только маленькие — не сняты, ищем
      - name: Второй котосветофор
        addr: у сквера Котофейни
        note: их два, перемигиваются — снят пока один
      - name: Знак «Осторожно, коты»
        note: по слухам, существует — подтвердить фотографией
      - name: Кот на старой опоре ЛЭП
        addr: между Курортным, 20А и Курхаусом
        note: по чужим находкам — он там правда есть

  - title: Найди дракона
    id: drakony
    text: >
      Подсказку мы нашли на стенде «Путеводителя по Зеленоградску для детей» —
      его сделали третьеклассники местной школы, проект-победитель фестиваля
      «Зелёный луч» 2024 года. Среди заданий там написано буквально: «на старых
      домах можно найти изображение дракона». Дети знают то, чего не знаем мы.
    how: >
      Смотреть на фасады старых немецких домов: лепнина, флюгеры, водостоки.
      Сколько драконов в городе — неизвестно. Первый найденный откроет счёт.
    items:
      - name: Драконы на старых домах
        note: ни одного пока не найдено — счёт ждёт

fragile:
  - Расписные электрошкафы — их перекрашивают; серия может смениться в любой сезон
  - Письма в почте кото-шефа — забирают; ящик на месте, содержимое меняется
