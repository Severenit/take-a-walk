title: Квесты
intro: >
  Проекты, которые тянутся через весь город. Их не пройти за одну прогулку —
  их собирают годами, по одному объекту.

quests:
  - title: Заплатки Екатерины Березиной
    score: Найдено 6
    text: >
      Актриса и художница. Первые фигурки поставила в июне 2025-го в арке Фонтанного дома.
      По городу их около двадцати: большинство в Центральном районе, три на Васильевском,
      одна на Петроградке. Но экземпляр с Графского подписан №67 — значит, либо статьи
      отстали, либо она считает по-своему. Карта с адресами лежит у неё в телеграм-канале.
    have:
      - Моховая, 28
      - Моховая, 33–35
      - Рылеева, 8
      - наб. Фонтанки, 23
      - Графский пер., 5
      - Галерная, 16

  - title: a l e s h a — прозрачная брусчатка
    score: Найдено 4 из 21
    text: >
      Метод обратный обычному: сначала придумывает предмет, потом ищет под него место
      с брусчаткой. Первые объекты были настоящими вещами, но «плохо себя чувствовали»
      в городских условиях — теперь только муляжи. Коллекцию он постоянно обновляет:
      яблоко, груша, яйцо, яичница и хлебные крошки уже менялись. Поэтому не удивляйтесь,
      если по адресу окажется пусто или что-то другое.
    have:
      - Плёнка Kodak — Малая Садовая, 3/54
      - Яйцо — Галерная, 19
      - Корюшка — Садовая, у Никольского
      - Тюльпан — Конногвардейский бульвар (был, но не нашёлся)
    todo:
      - Тюбик — Соляной пер., 16
      - Эволюция — Кронверкский пр.
      - Попкорн — Большой пр. П.С., 35
      - Яичница / игрушка — Большой пр. В.О., 16/14Б
      - Сетка — Университетская наб., 15
      - Заяц — Каменноостровский пр.
      - Бумажный кораблик — наб. реки Фонтанки
      - Надувные собачки — сад ТЮЗа
      - Вышивка (× Василий Базелевс) — Ковенский пер., 2
      - Корюшка — Воскресенская наб.
      - Черновик — адрес неизвестен
    note: >
      Корюшку издание Metro числит на Воскресенской набережной, а найдена она была
      у Никольского. Либо их две, либо рыбу переставили. Тюльпан на Конногвардейском
      значится у всех, но на месте его не оказалось — возможно, заменён.

  - title: Руки
    text: >
      Протянутая ладонь вместо дверной ручки. Их в городе несколько, и все разные.
    have:
      - Колокольная, 12
    todo:
      - Рубинштейна, 1 — бар «Сайгон», отполирована до блеска
      - Харьковская, 8А — редакция «Коммерсанта»
      - Мальтийская капелла — «Рука со свитком»
      - Церковь Св. Екатерины, Невский, 32–34

  - title: Домики в деревьях
    text: >
      Дверца в стволе, иногда с лестницей и фонарём. Табличек нет, автор неизвестен.
    have:
      - Исаакиевский сквер — тролль
      - Екатерининский сквер — гном
    todo:
      - Севкабель Порт
      - Манежная площадь
      - Михайловский сквер
      - Александровский парк
      - Дрезденская, 10к2

  - title: Небо в колодцах
    score: Собрано 0 из 7
    text: >
      Каждый двор-колодец Петроградки вырезает из неба свою фигуру: восьмиугольник,
      квадрат, треугольную звезду. Правило сбора: встать в центре двора и снять небо
      строго вертикально. Дворы закрывают без предупреждения, поэтому каждый
      открытый — удача. Два колодца уже стоят в маршруте «Петроградка наизнанку» —
      с них коллекция и начнётся.
    todo:
      - Восьмиугольник — Малый пр. П.С., 1Б, дом Занина. В центре — железное «дерево желаний»
      - Его «обычный» сосед — тот же квартал, у Съезжинской
      - Малый пр. П.С., 15 — терракотовые стены
      - Три двора подряд — Большой пр. П.С., 106, вход с Карповки. В третьем небо — звездой
      - Дворы дома Бенуа — Каменноостровский, 26–28, посчитать так никто и не смог
      - Колодец с эркером-ротондой и витражами лестницы — адрес неизвестен
      - Узкий колодец с серебристыми трубами — адрес неизвестен

