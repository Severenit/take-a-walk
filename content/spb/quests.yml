title: Квесты
intro: >
  Проекты, которые тянутся через весь город. Их не пройти за одну прогулку —
  их собирают годами, по одному объекту. У каждого пункта: «карта» ведёт на точку,
  красная галочка — подтверждено и описано, пустой кружок можно отметить самому,
  когда найдёте (отметка живёт в этом телефоне).

quests:
  - title: Заплатки Екатерины Березиной
    id: zaplatki
    score: Найдено 6
    text: >
      Актриса и художница. Первые фигурки поставила в июне 2025-го в арке Фонтанного дома.
      По городу их около двадцати: большинство в Центральном районе, три на Васильевском,
      одна на Петроградке. Но экземпляр с Графского подписан №67 — значит, либо статьи
      отстали, либо она считает по-своему.
    how: >
      Глиняные фигурки размером с ладонь сидят в трещинах и сколах фасадов — смотреть
      на уровне глаз и ниже, особенно в арках. Карта с адресами есть в её
      телеграм-канале, но интереснее находить без неё.
    items:
      - addr: Моховая, 28
        have: yes
      - addr: Моховая, 33–35
        have: yes
      - addr: Рылеева, 8
        have: yes
      - addr: наб. Фонтанки, 23
        have: yes
      - addr: Графский пер., 5
        have: yes
        note: подписана №67
      - addr: Галерная, 16
        have: yes

  - title: a l e s h a — прозрачная брусчатка
    id: alesha
    score: Найдено 4 из 21
    text: >
      Метод обратный обычному: сначала придумывает предмет, потом ищет под него место
      с брусчаткой. Первые объекты были настоящими вещами, но «плохо себя чувствовали»
      в городских условиях — теперь только муляжи. Коллекцию он постоянно обновляет:
      яблоко, груша, яйцо, яичница и хлебные крошки уже менялись.
    how: >
      Смотреть строго под ноги: предмет лежит в мостовой под прозрачной «брусчаткой».
      Если по адресу пусто или лежит что-то другое — это не промах, коллекция живая.
    items:
      - name: Плёнка Kodak
        addr: Малая Садовая, 3/54
        have: yes
      - name: Яйцо
        addr: Галерная, 19
        have: yes
      - name: Корюшка
        addr: Садовая, у Никольского
        have: yes
      - name: Тюльпан
        addr: Конногвардейский бульвар
        have: yes
        note: был, но не нашёлся
      - name: Тюбик
        addr: Соляной пер., 16
      - name: Эволюция
        addr: Кронверкский пр.
      - name: Попкорн
        addr: Большой пр. П.С., 35
      - name: Яичница / игрушка
        addr: Большой пр. В.О., 16/14Б
      - name: Сетка
        addr: Университетская наб., 15
      - name: Заяц
        addr: Каменноостровский пр.
      - name: Бумажный кораблик
        addr: наб. реки Фонтанки
      - name: Надувные собачки
        addr: сад ТЮЗа
      - name: Вышивка (× Василий Базелевс)
        addr: Ковенский пер., 2
      - name: Корюшка
        addr: Воскресенская наб.
      - name: Черновик
        note: адрес неизвестен
    note: >
      Корюшку издание Metro числит на Воскресенской набережной, а найдена она была
      у Никольского. Либо их две, либо рыбу переставили. Тюльпан на Конногвардейском
      значится у всех, но на месте его не оказалось — возможно, заменён.

  - title: Руки
    id: ruki
    text: >
      Протянутая ладонь вместо дверной ручки. Их в городе несколько, и все разные.
    how: >
      Смотреть на двери: ладонь отлита вместо ручки или скобы. Самые известные —
      отполированы до блеска тысячами рукопожатий.
    items:
      - addr: Колокольная, 12
        have: yes
      - addr: Рубинштейна, 1
        note: бар «Сайгон», отполирована до блеска
      - addr: Харьковская, 8А
        note: редакция «Коммерсанта»
      - name: Мальтийская капелла
        addr: Мальтийская капелла
        note: «Рука со свитком»
      - name: Церковь Св. Екатерины
        addr: Невский, 32–34

  - title: Домики в деревьях
    id: domiki
    text: >
      Дверца в стволе, иногда с лестницей и фонарём. Табличек нет, автор неизвестен.
    how: >
      Смотреть на стволы старых деревьев в парках и скверах: маленькая деревянная
      дверца, иногда с крыльцом. Ниже уровня глаз.
    items:
      - name: Тролль
        addr: Исаакиевский сквер
        have: yes
      - name: Гном
        addr: Екатерининский сквер
        have: yes
      - addr: Севкабель Порт
      - addr: Манежная площадь
      - addr: Михайловский сквер
      - addr: Александровский парк
      - addr: Дрезденская, 10к2

  - title: Небо в колодцах
    id: kolodtsy
    text: >
      Каждый двор-колодец вырезает из неба свою фигуру: восьмиугольник, квадрат,
      треугольную звезду. Пока вся коллекция — на Петроградке, но колодцы есть
      по всему городу: нашли новый — добавляем.
    how: >
      Зайти во двор, встать в центре, снять небо строго вертикально — это и есть
      «собрать» колодец. Дворы закрывают без предупреждения, поэтому каждый
      открытый — удача. Заходить тихо: это чьи-то окна.
    items:
      - name: Восьмиугольник
        addr: Малый пр. П.С., 1Б
        geo: 59.953577, 30.290338
        note: дом Занина, 1914–1916. В центре — железное «дерево желаний»
      - name: Его «обычный» сосед
        addr: Съезжинская, 3 — соседний квартал
        note: из той же серии находок, точный двор искать рядом с восьмиугольником
      - name: Терракотовые стены
        addr: Малый пр. П.С., 15
      - name: Три двора подряд
        addr: Большой пр. П.С., 106
        geo: 59.96754, 30.31339
        note: вход через арку с Карповки. В третьем дворе небо — звездой, на трубах круглый ретро-фонарь
      - name: Дворы дома Бенуа
        addr: Каменноостровский пр., 26–28
        geo: 59.962447, 30.314601
        note: посчитать дворы так никто и не смог — есть в маршруте «Петроградка наизнанку»
      - name: Колодец с эркером-ротондой
        note: витражные окна лестницы, снят из-под арки — адрес неизвестен
      - name: Узкий колодец с трубами
        note: серебристые вентиляционные трубы до самого неба — адрес неизвестен

fragile:
  - Ангел на Мойке — Ракшу снимают регулярно, иногда за сутки
  - Заплатки — глина без обжига, лепится на фасад, отваливается
  - Бродский на Пестеля — граффити 2020 года, могли закрасить
  - Кинчев и Горшок — уже закрашивали в 2018-м. Вернули. Могут снова

