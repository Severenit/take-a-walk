  - Пестеля, 3 — автор двери с деревом
  - Пестеля, 14 — кто автор «Притяжения петербургского колодца»
  - Фонтанка, 23 — кто слепил голубя
  - Писарева, 10В — что за синие кариатиды
  - «Девушка с картами» — репродукция или авторская вещь
  - Домики в деревьях — имя автора
