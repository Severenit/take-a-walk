name: Санкт-Петербург
tagline: Заплатки, брусчатка и закрашенные стены
intro: >
  Шесть прогулок. Первую лучше делать утром, вторую — вечером, третью можно вклинить
  между делами, четвёртая съедает весь день и стоит того. Пятая — разведка
  по Петроградке, самая свежая.
order: [admiral, zaplatki, liteyny, ligovka, nevsky, petrogradka]
